<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="900" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#04060f"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="waveTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff0080" stop-opacity=".7"/>
      <stop offset="50%"  stop-color="#b700ff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity=".7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      text { font-family: 'Courier New', Consolas, monospace; }
      @keyframes floatA {
        0%,100%{transform:translateY(0);opacity:.2;}
        50%{transform:translateY(-5px);opacity:.35;}
      }
      @keyframes floatB {
        0%,100%{transform:translateY(0);opacity:.15;}
        50%{transform:translateY(-4px);opacity:.28;}
      }
      @keyframes floatC {
        0%,100%{transform:translateY(0);opacity:.18;}
        50%{transform:translateY(-6px);opacity:.30;}
      }
      .fa{animation:floatA 5s ease-in-out infinite;}
      .fb{animation:floatB 6s ease-in-out infinite 1s;}
      .fc{animation:floatC 7s ease-in-out infinite 0.5s;}
      @keyframes borderPulse {
        0%,100%{stroke:#ff0080;} 50%{stroke:#00ffff;}
      }
      .border{animation:borderPulse 4s ease-in-out infinite;}
    ]]></style>
  </defs>

  <rect width="900" height="100" fill="url(#bg)"/>
  <g opacity=".025" stroke="#b700ff" stroke-width=".5">
    <line x1="0" y1="33" x2="900" y2="33"/>
    <line x1="0" y1="66" x2="900" y2="66"/>
    <line x1="90"  y1="0" x2="90"  y2="100"/>
    <line x1="180" y1="0" x2="180" y2="100"/>
    <line x1="270" y1="0" x2="270" y2="100"/>
    <line x1="360" y1="0" x2="360" y2="100"/>
    <line x1="450" y1="0" x2="450" y2="100"/>
    <line x1="540" y1="0" x2="540" y2="100"/>
    <line x1="630" y1="0" x2="630" y2="100"/>
    <line x1="720" y1="0" x2="720" y2="100"/>
    <line x1="810" y1="0" x2="810" y2="100"/>
  </g>

  <!-- Mini floating icons (footer) -->
  <!-- Swift -->
  <g class="fa" transform="translate(40,18) scale(0.45)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#FA7343"/>
    <path d="M10,38 C10,38 30,34 40,18 C40,18 42,27 36,34 C36,34 46,28 48,19 C48,19 50,38 34,45 Z" fill="white" opacity=".95"/>
  </g>
  <!-- Flutter -->
  <g class="fb" transform="translate(110,22) scale(0.42)">
    <polygon points="26,2 50,26 35,41 11,17" fill="#54C5F8"/>
    <polygon points="11,41 35,41 50,56 26,56" fill="#01579B"/>
  </g>
  <!-- PHP -->
  <g class="fc" transform="translate(175,28) scale(0.42)">
    <ellipse cx="46" cy="20" rx="46" ry="21" fill="#777BB4"/>
    <text x="46" y="26" fill="white" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="2">php</text>
  </g>
  <!-- Git -->
  <g class="fa" transform="translate(272,20) scale(0.42)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#F05032"/>
    <circle cx="16" cy="16" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="36" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="16" r="6" fill="none" stroke="white" stroke-width="3"/>
    <line x1="16" y1="22" x2="16" y2="30" stroke="white" stroke-width="3"/>
    <line x1="16" y1="16" x2="30" y2="16" stroke="white" stroke-width="3"/>
    <path d="M22,24 Q36,24 36,30" fill="none" stroke="white" stroke-width="3"/>
  </g>
  <!-- Android -->
  <g class="fb" transform="translate(348,14) scale(0.40)">
    <rect x="6" y="28" width="40" height="26" rx="5" fill="#3DDC84"/>
    <path d="M6,30 C6,14 46,14 46,30 Z" fill="#3DDC84"/>
    <circle cx="18" cy="24" r="4" fill="white"/>
    <circle cx="34" cy="24" r="4" fill="white"/>
    <line x1="14" y1="14" x2="8"  y2="4" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="14" x2="44" y2="4" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Windows -->
  <g class="fc" transform="translate(432,26) scale(0.44)">
    <rect x="0"  y="0"  width="22" height="22" rx="3" fill="#F35325"/>
    <rect x="26" y="0"  width="22" height="22" rx="3" fill="#81BC06"/>
    <rect x="0"  y="26" width="22" height="22" rx="3" fill="#05A6F0"/>
    <rect x="26" y="26" width="22" height="22" rx="3" fill="#FFBA08"/>
  </g>
  <!-- JS -->
  <g class="fa" transform="translate(520,22) scale(0.44)">
    <rect x="0" y="0" width="52" height="52" rx="5" fill="#F7DF1E"/>
    <text x="26" y="38" fill="#1a1a2e" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="-1">JS</text>
  </g>
  <!-- Laravel -->
  <g class="fb" transform="translate(598,20) scale(0.44)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#FF2D20"/>
    <text x="26" y="40" fill="white" font-size="32" font-weight="bold" text-anchor="middle" font-style="italic">L</text>
  </g>
  <!-- macOS circle -->
  <g class="fc" transform="translate(680,22) scale(0.44)">
    <path d="M30,0 A30,30 0 0,1 60,30" fill="#34C759"/>
    <path d="M60,30 A30,30 0 0,1 30,60" fill="#007AFF"/>
    <path d="M30,60 A30,30 0 0,1 0,30" fill="#FF3B30"/>
    <path d="M0,30 A30,30 0 0,1 30,0" fill="#FF9500"/>
    <circle cx="30" cy="30" r="12" fill="#04060f"/>
  </g>
  <!-- Apple -->
  <g class="fa" transform="translate(760,22) scale(0.50)">
    <path d="M22,8 C18,4 12,4 10,8 C8,4 2,4 0,8 C-2,14 2,22 10,28 C10,28 11,29 12,29 C13,29 14,28 14,28 C22,22 26,14 24,8 Z" fill="#e2e8f0" transform="scale(1.5)"/>
    <path d="M12,0 C12,0 16,-4 20,-2" fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" transform="scale(1.5)"/>
  </g>
  <!-- VS Code -->
  <g class="fb" transform="translate(832,22) scale(0.44)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#007ACC"/>
    <polyline points="34,12 20,26 34,40" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="38" y1="12" x2="38" y2="40" stroke="white" stroke-width="5" stroke-linecap="round" opacity=".7"/>
  </g>

  <!-- Top border gradient -->
  <rect class="border" x="0" y="0" width="900" height="2.5" fill="url(#waveTop)"/>

  <!-- Center text -->
  <text x="450" y="62" fill="#4a5568" font-size="11" text-anchor="middle" letter-spacing="3" filter="url(#glow)">◈  Built with passion · iOS · Fullstack · Flutter  ◈</text>
  <text x="450" y="80" fill="#1e2d4a" font-size="10" text-anchor="middle" letter-spacing="2">© faqih55 · 2025 · Indonesia</text>
</svg>
