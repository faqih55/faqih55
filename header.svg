<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#04060f"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      text { font-family: 'Courier New', Consolas, 'Lucida Console', monospace; }

      /* ── Inner orbit: Clockwise, rx=228, ry=90 ── */
      @keyframes inner-cw {
        0%     { transform: translate( 228px,   0px); }
        8.33%  { transform: translate( 197px,  45px); }
        16.67% { transform: translate( 114px,  78px); }
        25%    { transform: translate(   0px,  90px); }
        33.33% { transform: translate(-114px,  78px); }
        41.67% { transform: translate(-197px,  45px); }
        50%    { transform: translate(-228px,   0px); }
        58.33% { transform: translate(-197px, -45px); }
        66.67% { transform: translate(-114px, -78px); }
        75%    { transform: translate(   0px, -90px); }
        83.33% { transform: translate( 114px, -78px); }
        91.67% { transform: translate( 197px, -45px); }
        100%   { transform: translate( 228px,   0px); }
      }

      /* ── Outer orbit: Counter-clockwise, rx=290, ry=122 ── */
      @keyframes outer-ccw {
        0%     { transform: translate( 290px,    0px); }
        8.33%  { transform: translate( 251px,  -61px); }
        16.67% { transform: translate( 145px, -106px); }
        25%    { transform: translate(   0px, -122px); }
        33.33% { transform: translate(-145px, -106px); }
        41.67% { transform: translate(-251px,  -61px); }
        50%    { transform: translate(-290px,    0px); }
        58.33% { transform: translate(-251px,   61px); }
        66.67% { transform: translate(-145px,  106px); }
        75%    { transform: translate(   0px,  122px); }
        83.33% { transform: translate( 145px,  106px); }
        91.67% { transform: translate( 251px,   61px); }
        100%   { transform: translate( 290px,    0px); }
      }

      /* 7 inner icons – 14s orbit, 2s spacing */
      .in0 { animation: inner-cw 14s linear    0s infinite; }
      .in1 { animation: inner-cw 14s linear   -2s infinite; }
      .in2 { animation: inner-cw 14s linear   -4s infinite; }
      .in3 { animation: inner-cw 14s linear   -6s infinite; }
      .in4 { animation: inner-cw 14s linear   -8s infinite; }
      .in5 { animation: inner-cw 14s linear  -10s infinite; }
      .in6 { animation: inner-cw 14s linear  -12s infinite; }

      /* 8 outer icons – 22s orbit, 2.75s spacing */
      .ou0 { animation: outer-ccw 22s linear    0s    infinite; }
      .ou1 { animation: outer-ccw 22s linear   -2.75s infinite; }
      .ou2 { animation: outer-ccw 22s linear   -5.5s  infinite; }
      .ou3 { animation: outer-ccw 22s linear   -8.25s infinite; }
      .ou4 { animation: outer-ccw 22s linear  -11s    infinite; }
      .ou5 { animation: outer-ccw 22s linear  -13.75s infinite; }
      .ou6 { animation: outer-ccw 22s linear  -16.5s  infinite; }
      .ou7 { animation: outer-ccw 22s linear  -19.25s infinite; }

      @keyframes borderPulse {
        0%,100% { fill: #00ffff; }
        50%      { fill: #b700ff; }
      }
      .bt { animation: borderPulse 4s ease-in-out infinite; }
      .bb { animation: borderPulse 4s ease-in-out infinite 2s; }

      @keyframes titlePulse { 0%,100%{opacity:1;} 50%{opacity:.88;} }
      .title { animation: titlePulse 4s ease-in-out infinite; }

      @keyframes subFade { 0%,100%{opacity:.8;} 50%{opacity:1;} }
      .subtitle { animation: subFade 3s ease-in-out infinite 1s; }
    ]]></style>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity=".025" stroke="#00ffff" stroke-width=".5">
    <line x1="0" y1="93"  x2="900" y2="93"/>
    <line x1="0" y1="186" x2="900" y2="186"/>
    <line x1="90"  y1="0" x2="90"  y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="270" y1="0" x2="270" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="630" y1="0" x2="630" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="810" y1="0" x2="810" y2="280"/>
  </g>

  <!-- Orbit track lines -->
  <ellipse cx="450" cy="135" rx="228" ry="90"  fill="none" stroke="#00ffff" stroke-width=".7" stroke-dasharray="4,10" opacity=".18"/>
  <ellipse cx="450" cy="135" rx="290" ry="122" fill="none" stroke="#b700ff" stroke-width=".7" stroke-dasharray="4,12" opacity=".12"/>

  <!-- ════════════════════════════════════════════
       INNER ORBIT – CLOCKWISE (14s, 7 icons)
       Center of orbit: (450, 135)
  ════════════════════════════════════════════ -->

  <!-- in0: Swift -->
  <g transform="translate(450,135)"><g class="in0">
    <rect x="-13" y="-13" width="26" height="26" rx="6" fill="#FA7343"/>
    <path d="M-7,7 C-7,7 4,5 10,-3 C10,-3 11,2 8,6 C8,6 13,0 13,-5 C13,-5 14,6 6,10 Z" fill="white" opacity=".95"/>
  </g></g>

  <!-- in1: Apple -->
  <g transform="translate(450,135)"><g class="in1">
    <path d="M1,-10 C-3,-14 -9,-14 -10,-10 C-12,-14 -18,-14 -19,-10 C-21,-4 -17,4 -9,9 L9,9 C17,4 21,-4 19,-10 Z" fill="#d0d0d0"/>
    <path d="M1,-14 L5,-18" stroke="#d0d0d0" stroke-width="2" stroke-linecap="round"/>
  </g></g>

  <!-- in2: Git -->
  <g transform="translate(450,135)"><g class="in2">
    <rect x="-13" y="-13" width="26" height="26" rx="6" fill="#F05032"/>
    <circle cx="-4" cy="-4" r="3"  fill="none" stroke="white" stroke-width="1.8"/>
    <circle cx="4"  cy="4"  r="3"  fill="none" stroke="white" stroke-width="1.8"/>
    <circle cx="4"  cy="-4" r="3"  fill="none" stroke="white" stroke-width="1.8"/>
    <line x1="-4" y1="-1" x2="-4" y2="1"  stroke="white" stroke-width="1.8"/>
    <line x1="-4" y1="-4" x2="1"  y2="-4" stroke="white" stroke-width="1.8"/>
    <path d="M1,0 Q4,0 4,1" fill="none" stroke="white" stroke-width="1.8"/>
  </g></g>

  <!-- in3: Flutter -->
  <g transform="translate(450,135)"><g class="in3">
    <polygon points="0,-13 13,0 6,7 -7,-6" fill="#54C5F8"/>
    <polygon points="-7,6 6,6 13,13 0,13"  fill="#01579B"/>
    <polygon points="6,6 13,6 13,13 10,16"  fill="#29B6F6" opacity=".8"/>
  </g></g>

  <!-- in4: Android -->
  <g transform="translate(450,135)"><g class="in4">
    <path d="M-9,-4 C-9,-14 9,-14 9,-4 Z"  fill="#3DDC84"/>
    <rect x="-9" y="-4" width="18" height="13" rx="3" fill="#3DDC84"/>
    <circle cx="-3" cy="-8"  r="2.2" fill="white"/>
    <circle cx="3"  cy="-8"  r="2.2" fill="white"/>
    <line x1="-6"  y1="-13" x2="-10" y2="-18" stroke="#3DDC84" stroke-width="2" stroke-linecap="round"/>
    <line x1="6"   y1="-13" x2="10"  y2="-18" stroke="#3DDC84" stroke-width="2" stroke-linecap="round"/>
    <rect x="-12" y="-2" width="4"  height="10" rx="2" fill="#3DDC84"/>
    <rect x="8"   y="-2" width="4"  height="10" rx="2" fill="#3DDC84"/>
    <rect x="-6"  y="9"  width="4"  height="6"  rx="2" fill="#3DDC84"/>
    <rect x="2"   y="9"  width="4"  height="6"  rx="2" fill="#3DDC84"/>
  </g></g>

  <!-- in5: Windows -->
  <g transform="translate(450,135)"><g class="in5">
    <rect x="-13" y="-13" width="11" height="11" rx="2" fill="#F35325"/>
    <rect x="2"   y="-13" width="11" height="11" rx="2" fill="#81BC06"/>
    <rect x="-13" y="2"   width="11" height="11" rx="2" fill="#05A6F0"/>
    <rect x="2"   y="2"   width="11" height="11" rx="2" fill="#FFBA08"/>
  </g></g>

  <!-- in6: JavaScript -->
  <g transform="translate(450,135)"><g class="in6">
    <rect x="-13" y="-13" width="26" height="26" rx="3" fill="#F7DF1E"/>
    <text x="0" y="6" fill="#1a1a2e" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="-0.5">JS</text>
  </g></g>

  <!-- ════════════════════════════════════════════
       OUTER ORBIT – COUNTER-CLOCKWISE (22s, 8 icons)
  ════════════════════════════════════════════ -->

  <!-- ou0: VS Code -->
  <g transform="translate(450,135)"><g class="ou0">
    <rect x="-14" y="-14" width="28" height="28" rx="6" fill="#007ACC"/>
    <polyline points="4,-8 -4,0 4,8" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="8" y1="-8" x2="8" y2="8" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity=".7"/>
  </g></g>

  <!-- ou1: PHP -->
  <g transform="translate(450,135)"><g class="ou1">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#777BB4"/>
    <text x="0" y="4" fill="white" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="1">php</text>
  </g></g>

  <!-- ou2: Linux Tux (simplified head) -->
  <g transform="translate(450,135)"><g class="ou2">
    <ellipse cx="0" cy="2"  rx="12" ry="13" fill="#F5C518"/>
    <ellipse cx="0" cy="3"  rx="7"  ry="8"  fill="#f0e68c"/>
    <ellipse cx="0" cy="-9" rx="12" ry="10" fill="#F5C518"/>
    <ellipse cx="-6" cy="-17" rx="4" ry="6" fill="#F5C518"/>
    <ellipse cx="6"  cy="-17" rx="4" ry="6" fill="#F5C518"/>
    <ellipse cx="-4" cy="-10" rx="3" ry="4" fill="#1a1a2e"/>
    <ellipse cx="4"  cy="-10" rx="3" ry="4" fill="#1a1a2e"/>
    <circle  cx="-4" cy="-11" r="1.4" fill="white"/>
    <circle  cx="4"  cy="-11" r="1.4" fill="white"/>
    <polygon points="0,-4 -3,-1 3,-1" fill="#ff8c00"/>
  </g></g>

  <!-- ou3: Xcode -->
  <g transform="translate(450,135)"><g class="ou3">
    <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#147EFB"/>
    <rect x="-2.5" y="-9" width="5"  height="14" rx="3"   fill="white" opacity=".95"/>
    <rect x="-9"   y="-9" width="18" height="5.5" rx="3"  fill="white" opacity=".95"/>
    <rect x="3"    y="3"  width="5.5" height="8" rx="2.5" fill="#ffd700" opacity=".95"/>
    <polygon points="3,11 8.5,11 5.5,15" fill="#ffd700" opacity=".95"/>
  </g></g>

  <!-- ou4: Laravel -->
  <g transform="translate(450,135)"><g class="ou4">
    <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#FF2D20"/>
    <text x="0" y="8" fill="white" font-size="20" font-weight="bold" text-anchor="middle" font-style="italic">L</text>
  </g></g>

  <!-- ou5: MySQL -->
  <g transform="translate(450,135)"><g class="ou5">
    <ellipse cx="0" cy="-10" rx="13" ry="5"  fill="#00618A"/>
    <rect    x="-13" y="-10" width="26" height="9"  fill="#00618A"/>
    <ellipse cx="0" cy="-1"  rx="13" ry="5"  fill="#007cb5"/>
    <rect    x="-13" y="-1"  width="26" height="9"  fill="#007cb5"/>
    <ellipse cx="0" cy="8"   rx="13" ry="5"  fill="#007cb5"/>
    <path d="M8,-14 C12,-19 19,-16 15,-10" fill="none" stroke="#F29111" stroke-width="2.5" stroke-linecap="round"/>
  </g></g>

  <!-- ou6: GitHub (Octocat) -->
  <g transform="translate(450,135)"><g class="ou6">
    <circle cx="0" cy="0" r="15" fill="#1a1a2e" stroke="#d0d0d0" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="8"   ry="7.5" fill="#d0d0d0"/>
    <path d="M-8,-1 C-11,-9 -4,-9 -7,-1 Z"  fill="#d0d0d0"/>
    <path d="M8,-1 C11,-9 4,-9 7,-1 Z"       fill="#d0d0d0"/>
    <circle cx="-3" cy="-4" r="2" fill="#1a1a2e"/>
    <circle cx="3"  cy="-4" r="2" fill="#1a1a2e"/>
    <ellipse cx="0" cy="0" rx="2.5" ry="2" fill="#aaa"/>
    <path d="M-7,5 C-9,10 -7,13 -4,12 C-2,13 2,13 4,12 C7,13 9,10 7,5 C7,5 4,7 0,7 C-4,7 -7,5 -7,5 Z" fill="#d0d0d0"/>
  </g></g>

  <!-- ou7: macOS -->
  <g transform="translate(450,135)"><g class="ou7">
    <path d="M0,-15 A15,15 0 0,1 15,0"  fill="#34C759"/>
    <path d="M15,0  A15,15 0 0,1 0,15"  fill="#007AFF"/>
    <path d="M0,15  A15,15 0 0,1 -15,0" fill="#FF3B30"/>
    <path d="M-15,0 A15,15 0 0,1 0,-15" fill="#FF9500"/>
    <circle cx="0" cy="0" r="6" fill="#04060f"/>
  </g></g>

  <!-- ════════════════════════════════════════════
       FOREGROUND: Title & Subtitle
  ════════════════════════════════════════════ -->

  <!-- Glow behind title -->
  <text x="450" y="124" fill="#00ffff" font-size="78" font-weight="bold" text-anchor="middle"
        letter-spacing="8" opacity=".22" filter="url(#titleGlow)">FAQIH55</text>
  <!-- Main title -->
  <text x="450" y="124" fill="#00ffff" font-size="78" font-weight="bold" text-anchor="middle"
        letter-spacing="8" class="title">FAQIH55</text>

  <!-- Subtitle -->
  <text x="450" y="162" fill="#e2e8f0" font-size="14.5" text-anchor="middle"
        letter-spacing="2" class="subtitle">iOS Developer · Fullstack Engineer · Digital Craftsman</text>

  <!-- Deco lines beside subtitle -->
  <line x1="55"  y1="162" x2="188" y2="162" stroke="#00ffff" stroke-width=".8" opacity=".3"/>
  <line x1="712" y1="162" x2="845" y2="162" stroke="#00ffff" stroke-width=".8" opacity=".3"/>

  <!-- Neon top/bottom borders -->
  <rect class="bt" x="0" y="0"   width="900" height="2.5"/>
  <rect class="bb" x="0" y="277" width="900" height="2.5"/>

  <!-- Corner brackets -->
  <g fill="none" stroke="#00ffff" stroke-width="1.5" opacity=".5">
    <polyline points="0,22 0,0 22,0"/>
    <polyline points="878,0 900,0 900,22"/>
    <polyline points="0,258 0,280 22,280"/>
    <polyline points="878,280 900,280 900,258"/>
  </g>
</svg>
