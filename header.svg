<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#04060f"/>
      <stop offset="50%" stop-color="#070b18"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff"/>
      <stop offset="40%"  stop-color="#00e5ff"/>
      <stop offset="70%"  stop-color="#b700ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <linearGradient id="waveTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity=".6"/>
      <stop offset="50%"  stop-color="#b700ff" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="waveBot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff0080" stop-opacity=".6"/>
      <stop offset="50%"  stop-color="#b700ff" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity=".6"/>
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconBlur">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      text { font-family: 'Courier New', Consolas, 'Lucida Console', monospace; }

      @keyframes floatA {
        0%,100% { transform:translateY(0) rotate(0deg); opacity:.18; }
        50%      { transform:translateY(-7px) rotate(4deg); opacity:.30; }
      }
      @keyframes floatB {
        0%,100% { transform:translateY(0) rotate(0deg); opacity:.14; }
        50%      { transform:translateY(-5px) rotate(-3deg); opacity:.24; }
      }
      @keyframes floatC {
        0%,100% { transform:translateY(0) rotate(0deg); opacity:.20; }
        50%      { transform:translateY(-9px) rotate(5deg); opacity:.32; }
      }
      @keyframes floatD {
        0%,100% { transform:translateY(0) rotate(0deg); opacity:.12; }
        50%      { transform:translateY(-6px) rotate(-4deg); opacity:.22; }
      }
      @keyframes floatE {
        0%,100% { transform:translateY(0) rotate(0deg); opacity:.16; }
        50%      { transform:translateY(-8px) rotate(3deg); opacity:.28; }
      }
      .fa { animation: floatA 5.5s ease-in-out infinite; }
      .fb { animation: floatB 7.0s ease-in-out infinite 0.8s; }
      .fc { animation: floatC 6.0s ease-in-out infinite 1.5s; }
      .fd { animation: floatD 8.0s ease-in-out infinite 2.0s; }
      .fe { animation: floatE 6.5s ease-in-out infinite 0.4s; }

      @keyframes titlePulse {
        0%,100% { filter:url(#titleGlow); opacity:1; }
        50%      { opacity:.92; }
      }
      .title { animation: titlePulse 4s ease-in-out infinite; }

      @keyframes subtitleFade {
        0%,100% { opacity:.85; }
        50%      { opacity:1; }
      }
      .subtitle { animation: subtitleFade 3s ease-in-out infinite 1s; }

      @keyframes scanH {
        0%   { transform:translateX(-900px); opacity:.04; }
        100% { transform:translateX(900px);  opacity:.04; }
      }
      .scanH { animation: scanH 6s linear infinite; }

      @keyframes borderPulse {
        0%,100% { stroke:#00ffff; opacity:.8; }
        50%      { stroke:#b700ff; opacity:1; }
      }
      .borderTop { animation: borderPulse 4s ease-in-out infinite; }
      .borderBot { animation: borderPulse 4s ease-in-out infinite 2s; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Subtle vertical grid lines -->
  <g opacity=".03" stroke="#00ffff" stroke-width=".5">
    <line x1="60"  y1="0" x2="60"  y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="420" y1="0" x2="420" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="660" y1="0" x2="660" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
    <line x1="780" y1="0" x2="780" y2="200"/>
    <line x1="840" y1="0" x2="840" y2="200"/>
    <line x1="0" y1="67"  x2="900" y2="67"/>
    <line x1="0" y1="134" x2="900" y2="134"/>
  </g>

  <!-- Horizontal scan line -->
  <rect class="scanH" y="0" width="900" height="1.5" fill="#00ffff"/>

  <!-- ════════════════════════════════
       FLOATING TECH ICONS (LEFT SIDE)
  ════════════════════════════════ -->

  <!-- Apple -->
  <g class="fa" transform="translate(18,30) scale(0.65)">
    <path d="M22,8 C18,4 12,4 10,8 C8,4 2,4 0,8 C-2,14 2,22 10,28 C10,28 11,29 12,29 C13,29 14,28 14,28 C22,22 26,14 24,8 Z" fill="#e2e8f0" transform="scale(1.5)"/>
    <path d="M12,0 C12,0 16,-4 20,-2" fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" transform="scale(1.5)"/>
    <text x="18" y="65" fill="#e2e8f0" font-size="10" text-anchor="middle" letter-spacing="1">APPLE</text>
  </g>

  <!-- Swift -->
  <g class="fb" transform="translate(80,22) scale(0.7)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#FA7343"/>
    <path d="M10,38 C10,38 30,34 40,18 C40,18 42,27 36,34 C36,34 46,28 48,19 C48,19 50,38 34,45 C34,45 25,47 10,38 Z" fill="white" opacity=".95"/>
    <text x="26" y="68" fill="#FA7343" font-size="10" text-anchor="middle" letter-spacing="1">SWIFT</text>
  </g>

  <!-- Git -->
  <g class="fc" transform="translate(154,28) scale(0.65)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#F05032"/>
    <circle cx="16" cy="16" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="36" r="6" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="16" r="6" fill="none" stroke="white" stroke-width="3"/>
    <line x1="16" y1="22" x2="16" y2="30" stroke="white" stroke-width="3"/>
    <line x1="16" y1="16" x2="30" y2="16" stroke="white" stroke-width="3"/>
    <path d="M22,24 Q36,24 36,30" fill="none" stroke="white" stroke-width="3"/>
    <text x="25" y="66" fill="#F05032" font-size="10" text-anchor="middle" letter-spacing="1">GIT</text>
  </g>

  <!-- VS Code -->
  <g class="fd" transform="translate(220,25) scale(0.65)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#007ACC"/>
    <polyline points="34,12 20,26 34,40" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="38" y1="12" x2="38" y2="40" stroke="white" stroke-width="5" stroke-linecap="round" opacity=".7"/>
    <text x="26" y="68" fill="#007ACC" font-size="10" text-anchor="middle" letter-spacing="1">VSCODE</text>
  </g>

  <!-- Xcode -->
  <g class="fe" transform="translate(286,30) scale(0.65)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#147EFB"/>
    <rect x="22" y="8" width="8" height="22" rx="4" fill="white" opacity=".95"/>
    <rect x="12" y="8" width="28" height="10" rx="4" fill="white" opacity=".95"/>
    <rect x="32" y="26" width="8" height="16" rx="3" fill="#ffd700" opacity=".95"/>
    <polygon points="32,42 40,42 36,50" fill="#ffd700" opacity=".95"/>
    <text x="26" y="68" fill="#147EFB" font-size="10" text-anchor="middle" letter-spacing="1">XCODE</text>
  </g>

  <!-- PHP -->
  <g class="fa" transform="translate(354,38) scale(0.7)">
    <ellipse cx="46" cy="20" rx="46" ry="21" fill="#777BB4"/>
    <text x="46" y="26" fill="white" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="2">php</text>
    <text x="46" y="56" fill="#777BB4" font-size="10" text-anchor="middle" letter-spacing="1">PHP</text>
  </g>

  <!-- ════════════════════════════════
       FLOATING TECH ICONS (RIGHT SIDE)
  ════════════════════════════════ -->

  <!-- Flutter -->
  <g class="fc" transform="translate(502,22) scale(0.68)">
    <polygon points="26,2 50,26 35,41 11,17" fill="#54C5F8"/>
    <polygon points="11,41 35,41 50,56 26,56" fill="#01579B"/>
    <polygon points="35,41 50,41 50,56 44,60" fill="#29B6F6" opacity=".8"/>
    <text x="30" y="74" fill="#54C5F8" font-size="10" text-anchor="middle" letter-spacing="1">FLUTTER</text>
  </g>

  <!-- Android -->
  <g class="fd" transform="translate(574,18) scale(0.6)">
    <rect x="6" y="28" width="40" height="26" rx="5" fill="#3DDC84"/>
    <path d="M6,30 C6,14 46,14 46,30 Z" fill="#3DDC84"/>
    <circle cx="18" cy="24" r="4" fill="white"/>
    <circle cx="34" cy="24" r="4" fill="white"/>
    <line x1="14" y1="14" x2="8"  y2="4" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="14" x2="44" y2="4" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
    <rect x="-2"  y="30" width="8"  height="18" rx="4" fill="#3DDC84"/>
    <rect x="46"  y="30" width="8"  height="18" rx="4" fill="#3DDC84"/>
    <rect x="12" y="54" width="8" height="14" rx="4" fill="#3DDC84"/>
    <rect x="32" y="54" width="8" height="14" rx="4" fill="#3DDC84"/>
    <text x="26" y="84" fill="#3DDC84" font-size="10" text-anchor="middle" letter-spacing="1">ANDROID</text>
  </g>

  <!-- Linux Tux -->
  <g class="fe" transform="translate(650,15) scale(0.58)">
    <ellipse cx="26" cy="52" rx="20" ry="24" fill="#F5C518"/>
    <ellipse cx="26" cy="55" rx="13" ry="17" fill="#f0e68c"/>
    <ellipse cx="26" cy="22" rx="18" ry="18" fill="#F5C518"/>
    <ellipse cx="18" cy="18" rx="5" ry="7" fill="#1a1a2e"/>
    <ellipse cx="34" cy="18" rx="5" ry="7" fill="#1a1a2e"/>
    <circle cx="18" cy="17" r="2.5" fill="white"/>
    <circle cx="34" cy="17" r="2.5" fill="white"/>
    <polygon points="26,28 20,33 32,33" fill="#ff8c00"/>
    <ellipse cx="10" cy="10" rx="6" ry="9" fill="#F5C518"/>
    <ellipse cx="42" cy="10" rx="6" ry="9" fill="#F5C518"/>
    <path d="M12,72 L5,82 L12,80 L10,88" fill="#ff8c00" stroke="#ff8c00" stroke-width="1.5"/>
    <path d="M40,72 L47,82 L40,80 L42,88" fill="#ff8c00" stroke="#ff8c00" stroke-width="1.5"/>
    <text x="26" y="102" fill="#F5C518" font-size="10" text-anchor="middle" letter-spacing="1">LINUX</text>
  </g>

  <!-- Windows -->
  <g class="fb" transform="translate(742,35) scale(0.68)">
    <rect x="0"  y="0"  width="22" height="22" rx="3" fill="#F35325"/>
    <rect x="26" y="0"  width="22" height="22" rx="3" fill="#81BC06"/>
    <rect x="0"  y="26" width="22" height="22" rx="3" fill="#05A6F0"/>
    <rect x="26" y="26" width="22" height="22" rx="3" fill="#FFBA08"/>
    <text x="24" y="66" fill="#e2e8f0" font-size="10" text-anchor="middle" letter-spacing="1">WINDOWS</text>
  </g>

  <!-- JavaScript -->
  <g class="fa" transform="translate(810,28) scale(0.65)">
    <rect x="0" y="0" width="52" height="52" rx="5" fill="#F7DF1E"/>
    <text x="26" y="38" fill="#1a1a2e" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="-1">JS</text>
    <text x="26" y="68" fill="#F7DF1E" font-size="10" text-anchor="middle" letter-spacing="1">JAVASCRIPT</text>
  </g>

  <!-- MySQL (bottom left) -->
  <g class="fd" transform="translate(18,118) scale(0.58)">
    <ellipse cx="28" cy="12" rx="26" ry="9" fill="#00618A"/>
    <rect x="2" y="12" width="52" height="18" fill="#00618A"/>
    <ellipse cx="28" cy="30" rx="26" ry="9" fill="#007cb5"/>
    <rect x="2" y="30" width="52" height="16" fill="#007cb5"/>
    <ellipse cx="28" cy="46" rx="26" ry="9" fill="#007cb5"/>
    <path d="M40,5 C46,-3 56,2 50,10" fill="none" stroke="#F29111" stroke-width="4" stroke-linecap="round"/>
    <text x="28" y="70" fill="#00618A" font-size="10" text-anchor="middle" letter-spacing="1">MYSQL</text>
  </g>

  <!-- Laravel (bottom right) -->
  <g class="fc" transform="translate(848,108) scale(0.68)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#FF2D20"/>
    <text x="26" y="40" fill="white" font-size="32" font-weight="bold" text-anchor="middle" font-style="italic">L</text>
    <text x="26" y="68" fill="#FF2D20" font-size="10" text-anchor="middle" letter-spacing="1">LARAVEL</text>
  </g>

  <!-- Dart (bottom center-right) -->
  <g class="fb" transform="translate(840,118) scale(0.6)">
    <!-- This will overlap Laravel - moved left -->
  </g>

  <!-- GitHub (bottom right area) -->
  <g class="fe" transform="translate(800,110) scale(0.58)">
    <circle cx="30" cy="30" r="30" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2.5"/>
    <ellipse cx="30" cy="27" rx="14" ry="13" fill="#e2e8f0"/>
    <path d="M18,20 C15,12 10,12 12,20 Z" fill="#e2e8f0"/>
    <path d="M42,20 C45,12 50,12 48,20 Z" fill="#e2e8f0"/>
    <circle cx="23" cy="24" r="3" fill="#1a1a2e"/>
    <circle cx="37" cy="24" r="3" fill="#1a1a2e"/>
    <ellipse cx="30" cy="30" rx="4" ry="3" fill="#c0c0c0"/>
    <path d="M20,40 C16,44 14,54 18,56 C22,58 24,54 30,54 C36,54 38,58 42,56 C46,54 44,44 40,40 C40,40 36,42 30,42 C24,42 20,40 20,40 Z" fill="#e2e8f0"/>
    <text x="30" y="76" fill="#e2e8f0" font-size="10" text-anchor="middle" letter-spacing="1">GITHUB</text>
  </g>

  <!-- macOS -->
  <g class="fa" transform="translate(130,108) scale(0.62)">
    <path d="M30,0 A30,30 0 0,1 60,30"  fill="#34C759"/>
    <path d="M60,30 A30,30 0 0,1 30,60" fill="#007AFF"/>
    <path d="M30,60 A30,30 0 0,1 0,30"  fill="#FF3B30"/>
    <path d="M0,30 A30,30 0 0,1 30,0"   fill="#FF9500"/>
    <circle cx="30" cy="30" r="12" fill="#04060f"/>
    <text x="30" y="78" fill="#e2e8f0" font-size="10" text-anchor="middle" letter-spacing="1">MACOS</text>
  </g>

  <!-- Dart (bottom center) -->
  <g class="fd" transform="translate(430,118) scale(0.62)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#0175C2"/>
    <polygon points="26,6 48,18 48,42 26,54 4,42 4,18" fill="#27B9F7" opacity=".7"/>
    <text x="26" y="36" fill="white" font-size="20" font-weight="bold" text-anchor="middle">D</text>
    <text x="26" y="70" fill="#0175C2" font-size="10" text-anchor="middle" letter-spacing="1">DART</text>
  </g>

  <!-- Android Studio (bottom center-left) -->
  <g class="fe" transform="translate(280,112) scale(0.60)">
    <circle cx="28" cy="28" r="28" fill="#3DDC84"/>
    <circle cx="28" cy="28" r="16" fill="none" stroke="#04060f" stroke-width="6"/>
    <ellipse cx="28" cy="23" rx="12" ry="11" fill="white" opacity=".9"/>
    <circle cx="21" cy="20" r="2.5" fill="#3DDC84"/>
    <circle cx="35" cy="20" r="2.5" fill="#3DDC84"/>
    <line x1="16" y1="13" x2="10" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="13" x2="46" y2="5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="28" y="72" fill="#3DDC84" font-size="9" text-anchor="middle" letter-spacing="1">A.STUDIO</text>
  </g>

  <!-- ════════════ NEON BORDERS ════════════ -->
  <rect class="borderTop" x="0" y="0" width="900" height="3" fill="url(#waveTop)"/>
  <rect class="borderBot" x="0" y="197" width="900" height="3" fill="url(#waveBot)"/>

  <!-- ════════════ MAIN TITLE ════════════ -->
  <!-- Glow layer -->
  <text x="450" y="112" fill="#00ffff" font-size="82" font-weight="bold" text-anchor="middle"
        letter-spacing="8" opacity=".25" filter="url(#titleGlow)"
        font-family="'Courier New', Consolas, monospace">FAQIH55</text>
  <!-- Main title with gradient simulation (two layers) -->
  <text x="450" y="112" font-size="82" font-weight="bold" text-anchor="middle"
        letter-spacing="8" fill="#00ffff" class="title"
        font-family="'Courier New', Consolas, monospace">FAQIH55</text>

  <!-- Subtitle -->
  <text x="450" y="148" fill="#e2e8f0" font-size="16" text-anchor="middle"
        letter-spacing="2" class="subtitle"
        font-family="'Courier New', Consolas, monospace">iOS Developer · Fullstack Engineer · Digital Craftsman</text>

  <!-- Decorative lines around subtitle -->
  <line x1="60"  y1="148" x2="200" y2="148" stroke="#00ffff" stroke-width=".8" opacity=".3"/>
  <line x1="700" y1="148" x2="840" y2="148" stroke="#00ffff" stroke-width=".8" opacity=".3"/>
  <line x1="60"  y1="151" x2="200" y2="151" stroke="#b700ff" stroke-width=".4" opacity=".2"/>
  <line x1="700" y1="151" x2="840" y2="151" stroke="#b700ff" stroke-width=".4" opacity=".2"/>

  <!-- Corner accents -->
  <g fill="none" stroke="#00ffff" stroke-width="1.5" opacity=".5">
    <polyline points="0,20 0,0 20,0"/>
    <polyline points="880,0 900,0 900,20"/>
    <polyline points="0,180 0,200 20,200"/>
    <polyline points="880,200 900,200 900,180"/>
  </g>
</svg>
