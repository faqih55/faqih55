<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
            .text-title { font-family: 'Share Tech Mono', monospace; font-size: 22px; fill: #00ffff; font-weight: bold; }
            .text-stat { font-family: 'Share Tech Mono', monospace; font-size: 36px; fill: #ffffff; font-weight: bold; }
            .text-label { font-family: 'Share Tech Mono', monospace; font-size: 14px; fill: #8b9bb4; }
            .text-rank { font-family: 'Share Tech Mono', monospace; font-size: 48px; fill: #ff0080; font-weight: bold; }
            
            .card-bg { fill: #070b14; stroke: #00ffff; stroke-width: 1; }
            .card-glow { fill: none; stroke: #00ffff; stroke-width: 4; opacity: 0.3; filter: blur(4px); }
            .card-glow-pink { fill: none; stroke: #ff0080; stroke-width: 4; opacity: 0.3; filter: blur(4px); }
            
            @keyframes pulseGlow {
                0% { opacity: 0.3; }
                50% { opacity: 0.7; }
                100% { opacity: 0.3; }
            }
            .glow-anim { animation: pulseGlow 3s infinite; }
            
            .bar-bg { fill: #1e2d4a; rx: 4; }
            .bar-swift { fill: #FA7343; rx: 4; }
            .bar-php { fill: #777BB4; rx: 4; }
            .bar-dart { fill: #0175C2; rx: 4; }
            .bar-ts { fill: #3178C6; rx: 4; }
        </style>
        
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="300" fill="#0d1117" rx="10" />
    
    <!-- Cyberpunk grid lines -->
    <g opacity="0.1" stroke="#00ffff" stroke-width="1">
        <line x1="0" y1="50" x2="800" y2="50" />
        <line x1="0" y1="100" x2="800" y2="100" />
        <line x1="0" y1="150" x2="800" y2="150" />
        <line x1="0" y1="200" x2="800" y2="200" />
        <line x1="0" y1="250" x2="800" y2="250" />
        <line x1="200" y1="0" x2="200" y2="300" />
        <line x1="400" y1="0" x2="400" y2="300" />
        <line x1="600" y1="0" x2="600" y2="300" />
    </g>

    <text x="30" y="40" class="text-title" filter="url(#neonGlow)">>_ SYSTEM_STATISTICS</text>

    <!-- Rank Card -->
    <g transform="translate(30, 70)">
        <rect class="card-glow-pink glow-anim" width="160" height="200" rx="8" />
        <rect class="card-bg" width="160" height="200" rx="8" stroke="#ff0080" />
        <text x="80" y="40" class="text-label" text-anchor="middle">OVERALL RANK</text>
        <circle cx="80" cy="110" r="50" fill="none" stroke="#ff0080" stroke-width="4" opacity="0.2" />
        <circle cx="80" cy="110" r="50" fill="none" stroke="#ff0080" stroke-width="4" stroke-dasharray="250" stroke-dashoffset="50" filter="url(#neonPink)" />
        <text x="80" y="125" class="text-rank" text-anchor="middle" filter="url(#neonPink)">S+</text>
        <text x="80" y="185" class="text-label" text-anchor="middle">TOP 1%</text>
    </g>

    <!-- Stats Cards -->
    <g transform="translate(220, 70)">
        <rect class="card-glow glow-anim" width="260" height="90" rx="8" />
        <rect class="card-bg" width="260" height="90" rx="8" />
        <text x="20" y="35" class="text-label">TOTAL COMMITS</text>
        <text x="20" y="70" class="text-stat" filter="url(#neonGlow)">1,204</text>
        
        <circle cx="210" cy="45" r="25" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3" />
        <!-- Commits Icon (Git branch simplified) -->
        <path d="M210 30 v30 M210 45 h-10 v10" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#neonGlow)" />
        <circle cx="210" cy="30" r="4" fill="#00ffff" />
        <circle cx="210" cy="60" r="4" fill="#00ffff" />
        <circle cx="200" cy="55" r="4" fill="#00ffff" />
    </g>

    <g transform="translate(220, 180)">
        <rect class="card-glow glow-anim" width="260" height="90" rx="8" />
        <rect class="card-bg" width="260" height="90" rx="8" />
        <text x="20" y="35" class="text-label">PULL REQUESTS</text>
        <text x="20" y="70" class="text-stat" filter="url(#neonGlow)">86</text>
        
        <circle cx="210" cy="45" r="25" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.3" />
        <path d="M200 60 v-20 c0 -10, 20 -10, 20 0 v20 M215 45 l5 -5 l5 5" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#neonGlow)" />
        <circle cx="200" cy="60" r="4" fill="#00ffff" />
        <circle cx="220" cy="60" r="4" fill="#00ffff" />
    </g>

    <!-- Languages Chart -->
    <g transform="translate(510, 70)">
        <rect class="card-glow glow-anim" width="260" height="200" rx="8" />
        <rect class="card-bg" width="260" height="200" rx="8" />
        <text x="20" y="35" class="text-label">TOP LANGUAGES</text>
        
        <!-- Swift -->
        <text x="20" y="70" class="text-label">Swift</text>
        <text x="210" y="70" class="text-label">45%</text>
        <rect x="20" y="80" width="220" height="6" class="bar-bg" />
        <rect x="20" y="80" width="100" height="6" class="bar-swift" filter="url(#neonGlow)" />
        
        <!-- PHP/Laravel -->
        <text x="20" y="110" class="text-label">PHP / Laravel</text>
        <text x="210" y="110" class="text-label">30%</text>
        <rect x="20" y="120" width="220" height="6" class="bar-bg" />
        <rect x="20" y="120" width="66" height="6" class="bar-php" filter="url(#neonGlow)" />
        
        <!-- Dart/Flutter -->
        <text x="20" y="150" class="text-label">Dart / Flutter</text>
        <text x="210" y="150" class="text-label">15%</text>
        <rect x="20" y="160" width="220" height="6" class="bar-bg" />
        <rect x="20" y="160" width="33" height="6" class="bar-dart" filter="url(#neonGlow)" />
        
        <!-- Web / TS -->
        <text x="20" y="190" class="text-label">Web (HTML/JS/TS)</text>
        <text x="210" y="190" class="text-label">10%</text>
        <rect x="20" y="200" width="220" height="6" class="bar-bg" />
        <rect x="20" y="200" width="22" height="6" class="bar-ts" filter="url(#neonGlow)" />
    </g>

    <!-- Corner Accents -->
    <path d="M10 30 L10 10 L30 10" fill="none" stroke="#00ffff" stroke-width="2" />
    <path d="M790 30 L790 10 L770 10" fill="none" stroke="#00ffff" stroke-width="2" />
    <path d="M10 270 L10 290 L30 290" fill="none" stroke="#00ffff" stroke-width="2" />
    <path d="M790 270 L790 290 L770 290" fill="none" stroke="#00ffff" stroke-width="2" />
</svg>