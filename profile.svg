<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <!-- NO @import — system fonts only, safe for GitHub Camo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#070b14"/>
      <stop offset="50%"  stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity=".15"/>
      <stop offset="50%"  stop-color="#b700ff" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="gSwift"   x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fa7343"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <linearGradient id="gPHP"     x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#777bb4"/>
      <stop offset="100%" stop-color="#b700ff"/>
    </linearGradient>
    <linearGradient id="gFlutter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#027dfd"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <linearGradient id="gJS"      x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7df1e"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="c1"><rect x="673" y="222" width="202" height="10" rx="5"/></clipPath>
    <clipPath id="c2"><rect x="673" y="260" width="202" height="10" rx="5"/></clipPath>
    <clipPath id="c3"><rect x="673" y="298" width="202" height="10" rx="5"/></clipPath>
    <clipPath id="c4"><rect x="673" y="336" width="202" height="10" rx="5"/></clipPath>

    <style><![CDATA[
      text { font-family: 'Courier New', Consolas, 'Lucida Console', monospace; }

      /* ── Border glow cycle ── */
      @keyframes borderCycle {
        0%,100% { stroke:#00ffff; }
        50%      { stroke:#b700ff; }
      }
      .border-outer { animation: borderCycle 4s ease-in-out infinite; }

      /* ── Corner blink ── */
      @keyframes cornerBlink {
        0%,100% { opacity:1; }
        50%      { opacity:.3; }
      }
      .corner { animation: cornerBlink 3s ease-in-out infinite; }

      /* ── Status pulse ── */
      @keyframes pulse {
        0%,100% { opacity:1; }
        50%      { opacity:.4; }
      }
      .pulse { animation: pulse 2s ease-in-out infinite; }

      /* ── Cursor blink ── */
      @keyframes blink {
        0%,49% { opacity:1; }
        50%,100%{ opacity:0; }
      }
      .cursor { animation: blink 1s step-end infinite; }

      /* ── Scanline sweep ── */
      @keyframes scan {
        0%   { transform: translateY(0px);   opacity:.06; }
        100% { transform: translateY(420px); opacity:0;   }
      }
      .scan { animation: scan 5s linear infinite; }

      /* ── Terminal lines appear ── */
      @keyframes show { to { opacity:1; } }
      .l0 { opacity:0; animation: show .01s  0.5s forwards; }
      .l1 { opacity:0; animation: show .01s  1.3s forwards; }
      .l2 { opacity:0; animation: show .01s  2.1s forwards; }
      .l3 { opacity:0; animation: show .01s  2.9s forwards; }
      .l4 { opacity:0; animation: show .01s  3.7s forwards; }
      .l5 { opacity:0; animation: show .01s  4.5s forwards; }
      .l6 { opacity:0; animation: show .01s  5.3s forwards; }
      .l7 { opacity:0; animation: show .01s  6.1s forwards; }
      .l8 { opacity:0; animation: show .01s  6.9s forwards; }

      /* ── Skill bars fill ── */
      @keyframes fillBar { from { width:0; } }
      .b1 { animation: fillBar 1.8s 1.0s ease-out forwards; width:0; }
      .b2 { animation: fillBar 1.8s 1.4s ease-out forwards; width:0; }
      .b3 { animation: fillBar 1.8s 1.8s ease-out forwards; width:0; }
      .b4 { animation: fillBar 1.8s 2.2s ease-out forwards; width:0; }

      /* ── Title flicker ── */
      @keyframes flicker {
        0%,18%,20%,52%,54%,100% { opacity:1; }
        19%,53%                  { opacity:.5; }
      }
      .flicker { animation: flicker 6s infinite; }
    ]]></style>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="900" height="480" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity=".04" stroke="#00ffff" stroke-width=".5">
    <line x1="0" y1="60"  x2="900" y2="60"/>  <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/> <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/> <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/>
    <line x1="60"  y1="0" x2="60"  y2="480"/> <line x1="120" y1="0" x2="120" y2="480"/>
    <line x1="180" y1="0" x2="180" y2="480"/> <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/> <line x1="360" y1="0" x2="360" y2="480"/>
    <line x1="420" y1="0" x2="420" y2="480"/> <line x1="480" y1="0" x2="480" y2="480"/>
