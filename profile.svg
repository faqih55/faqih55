  <text x="450" y="33" fill="#00ffff" font-size="14" font-weight="bold" text-anchor="middle"
        letter-spacing="5" filter="url(#glow)" class="flicker">◈  FAQIH55  ::  NEURAL INTERFACE  v2.0  ◈</text>

