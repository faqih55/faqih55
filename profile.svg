  <rect x="126" y="316" width="58"  height="22" rx="11" fill="none" stroke="#00ff88" stroke-width="1"/>
  <text x="155" y="331" fill="#00ff88" font-size="10" text-anchor="middle" letter-spacing="1">PHP</text>
