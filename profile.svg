      <text x="370" y="374" fill="#b700ff">&#10095;</text>
      <text x="384" y="374" fill="#4a5568">npm run dream</text>
      <rect class="cursor" x="384" y="382" width="9" height="14" fill="#00ffff"/>
    </g>

