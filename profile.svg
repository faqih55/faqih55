<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      * { font-family: 'Share Tech Mono', 'Courier New', monospace; }

      /* Neon Glow Filter */
      .glow-cyan { filter: drop-shadow(0 0 6px #00ffff) drop-shadow(0 0 12px #00ffff); }
      .glow-violet { filter: drop-shadow(0 0 6px #b700ff) drop-shadow(0 0 12px #b700ff); }
      .glow-pink { filter: drop-shadow(0 0 4px #ff0080); }

      /* Colors */
      .c-cyan { fill: #00ffff; }
      .c-violet { fill: #b700ff; }
      .c-pink { fill: #ff0080; }
      .c-white { fill: #e2e8f0; }
      .c-dim { fill: #4a5568; }
      .c-green { fill: #00ff88; }
      .c-yellow { fill: #ffd700; }

      /* Pulse animation for status */
      @keyframes pulse {
        0%, 100% { opacity: 1; r: 4px; filter: drop-shadow(0 0 4px #00ff88); }
        50% { opacity: 0.6; r: 6px; filter: drop-shadow(0 0 10px #00ff88); }
      }
      .pulse { animation: pulse 2s ease-in-out infinite; }

      /* Blink cursor */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }

      /* Scan line sweep */
      @keyframes scan {
        0% { y: 60px; opacity: 0.05; }
        100% { y: 460px; opacity: 0; }
      }
      .scan-line { animation: scan 4s linear infinite; }

      /* Terminal lines appearing */
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
      .t1 { opacity: 0; animation: appear 0.01s 0.5s forwards; }
      .t2 { opacity: 0; animation: appear 0.01s 1.2s forwards; }
      .t3 { opacity: 0; animation: appear 0.01s 2.0s forwards; }
      .t4 { opacity: 0; animation: appear 0.01s 2.8s forwards; }
      .t5 { opacity: 0; animation: appear 0.01s 3.6s forwards; }
      .t6 { opacity: 0; animation: appear 0.01s 4.4s forwards; }
      .t7 { opacity: 0; animation: appear 0.01s 5.2s forwards; }
      .t8 { opacity: 0; animation: appear 0.01s 6.0s forwards; }

      /* Border flow animation */
      @keyframes borderGlow {
        0% { stroke: #00ffff; filter: drop-shadow(0 0 3px #00ffff); }
        50% { stroke: #b700ff; filter: drop-shadow(0 0 8px #b700ff); }
        100% { stroke: #00ffff; filter: drop-shadow(0 0 3px #00ffff); }
      }
      .border-anim { animation: borderGlow 4s ease-in-out infinite; }

      /* Corner blink */
      @keyframes cornerBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .corner { animation: cornerBlink 3s ease-in-out infinite; }

      /* Skill bars fill */
      @keyframes fillBar {
        from { width: 0; }
      }
      .bar-swift { animation: fillBar 1.5s 1s ease-out forwards; width: 0; }
      .bar-php { animation: fillBar 1.5s 1.3s ease-out forwards; width: 0; }
      .bar-flutter { animation: fillBar 1.5s 1.6s ease-out forwards; width: 0; }
      .bar-js { animation: fillBar 1.5s 1.9s ease-out forwards; width: 0; }

      /* Neon flicker */
      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.4; }
      }
      .flicker { animation: flicker 5s infinite; }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b14"/>
      <stop offset="50%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#080c18"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#b700ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="barSwift" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa7343"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    <linearGradient id="barPHP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#777bb4"/>
      <stop offset="100%" style="stop-color:#b700ff"/>
    </linearGradient>
    <linearGradient id="barFlutter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#027dfd"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </linearGradient>
    <linearGradient id="barJS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7df1e"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonText" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="barClip1"><rect x="652" y="220" width="220" height="12" rx="6"/></clipPath>
    <clipPath id="barClip2"><rect x="652" y="258" width="220" height="12" rx="6"/></clipPath>
    <clipPath id="barClip3"><rect x="652" y="296" width="220" height="12" rx="6"/></clipPath>
    <clipPath id="barClip4"><rect x="652" y="334" width="220" height="12" rx="6"/></clipPath>
  </defs>

