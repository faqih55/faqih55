    <line x1="660" y1="0" x2="660" y2="480"/> <line x1="720" y1="0" x2="720" y2="480"/>
    <line x1="780" y1="0" x2="780" y2="480"/> <line x1="840" y1="0" x2="840" y2="480"/>
  </g>

  <!-- Scanline -->
