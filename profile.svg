  <!-- ─── Outer border (animated) ─── -->
  <rect class="border-outer" x="2" y="2" width="896" height="476" rx="12" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#glow-soft)"/>
  <rect x="6" y="6" width="888" height="468" rx="10" fill="none" stroke="#b700ff" stroke-width=".5" opacity=".3"/>

