  <text x="36" y="391" fill="#ff0080" font-size="11" letter-spacing="3" filter="url(#glow-soft)">&#9658; CONNECT.IO</text>
  <text x="36" y="414" fill="#4a5568" font-size="11">GH</text>
  <text x="58" y="414" fill="#1e2d4a" font-size="11">&#8250;</text>
  <text x="72" y="414" fill="#e2e8f0" font-size="11">github.com/faqih55</text>
  <text x="36" y="434" fill="#4a5568" font-size="11">IG</text>
